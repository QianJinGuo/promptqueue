server:
  port: 9090
  concurrency: 10
  rateLimit:
    windowMs: 60000
    max: 100

storage:
  type: sqlite
  path: ./data/promptqueue.db

routing:
  defaultStrategy: explicit
  fallbackModel: glm-5.1

providers:
#  anthropic:
#    apiKey: ${ANTHROPIC_API_KEY}
#    defaultModel: claude-sonnet-4-6
#  openai:
#    apiKey: ${OPENAI_API_KEY}
#    defaultModel: gpt-4o
  claude-code:
    type: cli
    command: claude
    defaultModel: glm-5.1

worker:
  pollInterval: 500
  retryBackoff: exponential
  retryDelay: 1000
  maxRetries: 3

opengorilla:
  enabled: true
  baseUrl: http://localhost:8190
  timeout: 5000
  contextEnrichment: true
  experienceCapture: true
  resultVerification: false
  smartRouting: false


